<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Sitewide custom CSS -->
  <link rel="stylesheet" href="styles.css">
  <!-- Weather icons -->
  <link rel="stylesheet" href="css/weather-icons-wind.css">
  <link rel="stylesheet" href="css/weather-icons.min.css">
  <title>JMHI Weather</title>
</head>

<body>
  <div class="container my-5 mx-auto ">
    <h1 class=" text-muted text-center my-4">JMHI Väder</h1>

    <form class="change-location my-4 text-center text-muted">
      <label for="city">Enter a location for weather information</label>
      <input type="text" name="city" id="city" class=" form-control p-4" placeholder="Sök efter en stad...">
    </form>


    <div class="card-container d-flex flex-row justify-content-around gap-1">
      <!-- Current weather card -->
      <div class="card shadow-lg rounded d-none ">
        <img src="" class="time card-img-top">
        <div class="icon bg-light mx-auto text-center">
          <img src="" alt="">
        </div>
        <div class="text-muted text-uppercase text-center details">

          <h5 class="my-3">City name</h5>
          <div class="my-3">Weather condition</div>
          <div class="display-4 my-4">
          </div>
        </div>
      </div>
      <!-- 18 hour forecast card  -->
      <div class="card shadow-lg rounded text-center">
        <div class="text-muted text-uppercase forecast-container px-4 pb-4">
        </div>
      </div>
    </div>
    <!-- 5 day forecast table -->
    <div class="forecastTableContainer mt-5">
      <h3>5-dygnsprognos</h3>
      <table class=" forecastTable table text-center fs-3 align-middle">

      </table>
    </div>
  </div>


  <script src="scripts/api.js"></script>
  <script src="scripts/forecast.js"></script>
  <script src="scripts/app.js" type="module"></script>
</body>

</html>
