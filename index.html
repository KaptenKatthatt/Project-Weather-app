<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <!-- Favicon -->
  <link rel="icon" href="https://fav.farm/%F0%9F%8C%84">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Sitewide custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
  <!-- Weather icons -->
  <link rel="stylesheet" href="css/weather-icons-wind.css">
  <link rel="stylesheet" href="css/weather-icons.min.css">

  <title>JMHI Weather</title>
</head>

<body>

  <!-- Site container -->
  <div class="container my-5 mx-auto ">
    <h1 class=" text-muted text-center my-4">JMHI Väder</h1>
    <div class="text-center my-3">
      <button id="theme-toggle" class="btn btn-outline-secondary">Växla till Natt</button>
    </div>
    <!-- Title and input -->
    <form class="change-location my-4 text-center text-muted">
      <label for="city">Den Fenomenala Väderstationen i Etern</label>
      <input type="text" name="city" id="city" class=" form-control p-4 fs-4" placeholder="Sök efter en stad...">
    </form>
    <!-- Cards container -->
    <div class="card-container d-flex flex-row justify-content-around gap-1 ">
      <!-- Current weather card -->
      <div class="card shadow-lg d-none rounded-3 overflow-hidden ">
        <img src="" class="time card-img-top">
        <div class="icon bg-body mx-auto text-center">
          <img src="" alt="">
        </div>
        <div class="text-muted text-uppercase text-center details">
          <div class="display-4 my-4">
          </div>
        </div>
      </div>
      <!-- 18 hour forecast card  -->
      <div class="card shadow-lg rounded-3  text-center d-none forecast-card">
        <div class="text-muted text-uppercase forecast-container px-4 pb-4 ">
        </div>
      </div>
    </div>
    <!-- 5 day forecast table -->
    <div class="forecastTableContainer mt-4 rounded-3">
      <div class="text-body display-6 p-3 forecastTitle bg-body rounded-3">5-dygnsprognos</>
        <table class=" forecastTable table text-center fs-4 align-middle">
          <thead>
            <tr>
              <th>
                Dygn
              </th>
              <th>
                Temp L/H
              </th>
              <th>Vind(byvind)</th>
              <th>Nederbörd</th>
            </tr>
          </thead>
          <tbody class="table-group-divider weatherTable">
          </tbody>
        </table>
      </div>
    </div>

    <script src="scripts/api.js"></script>
    <script src="scripts/forecast.js"></script>
    <script src="scripts/app.js" type="module"></script>
</body>

</html>
