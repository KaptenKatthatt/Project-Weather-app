<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <!-- Favicon -->
  <link rel="icon" href="https://fav.farm/%F0%9F%8C%84">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Sitewide custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
  <!-- Weather icons -->
  <link rel="stylesheet" href="css/weather-icons-wind.css">
  <link rel="stylesheet" href="css/weather-icons.min.css">

  <title>JMHI Weather</title>
</head>

<body>

  <!-- Site container -->
  <main class="site-container container mb-5">
    <h1 class=" text-muted text-center my-4">JMHI Väder</h1>
    <div class="text-center my-3">
      <button id="theme-toggle" class="btn btn-outline-secondary">Växla till Natt</button>
    </div>
    <!-- Title and input -->
    <form class="change-location my-4 text-center text-muted w-100">
      <p>Den Fenomenala Väderstationen i Etern</p>
      <label for="city" class="visually-hidden">Search for a city</label>
      <input type="text" name="city" id="city" class=" form-control p-4 fs-4" placeholder="Sök efter en stad...">
    </form>

    <div class="mainWeatherContainer mt-2 bg-body rounded-3 d-none py-4">
      <section class="mainLeft text-center text-muted">
        <!-- Flag -->
        <!-- cityName -->
        <!-- Hour of day -->
        <!-- weatherIcon -->
        <!-- weatherStatusName -->
        <!-- Temperature -->
        <!-- windArrow -->
        <!-- Windspeed -->
        <!-- Rain -->
      </section>
      <section class="mainRight text-center mt-4">
        <table class="table text-center mainRightTable">
        </table>
      </section>
    </div>

    <!-- 5 day forecast table -->
    <div class="forecastTableContainer mt-4 bg-body rounded-3 overflow-hidden mx-auto d-none">
      <div class="text-body display-6 p-3 forecastTitle bg-body">5-dygnsprognos</div>
      <table class="forecastTable table text-center fs-4 align-middle">
        <thead>
          <tr>
            <th>
              Dygn
            </th>
            <th><!-- Weather icon --></th>
            <th>
              L/H
            </th>
            <th>Vind(byvind)<span class="text-secondary fs-5">m/s</span></th>
            <th>Nederbörd<span class="text-secondary fs-5">mm</span></th>
          </tr>
        </thead>
        <tbody class="table-group-divider weatherTable">
        </tbody>
      </table>
    </div>
  </main>


  <script src="scripts/api.js"></script>
  <script src="scripts/forecast.js"></script>
  <script src="scripts/app.js" type="module"></script>
</body>

</html>
