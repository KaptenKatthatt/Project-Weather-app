<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <!-- Favicon -->
  <link rel="icon" href="https://fav.farm/%F0%9F%8C%84">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Sitewide custom CSS -->
  <!-- Weather icons -->
  <link rel="stylesheet" href="css/weather-icons-wind.css">
  <link rel="stylesheet" href="css/weather-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/mediaQueries.css">

  <title>JMHI Weather</title>
</head>

<body>

  <!-- Site container -->
  <main class="site-container container mb-5">
    <h1 class=" text-muted text-center my-4">JMHI Väder</h1>
    <p class="text-center">Den Fenomenala Väderstationen i Etern</p>
    <!-- Settings container -->
    <div class="settingsContainer d-flex justify-content-center align-items-center gap-5 flex-nowrap">
      <!-- Theme switch -->
      <div class="form-check form-switch d-flex align-items-center">
        <input class="form-check-input themeToggle fs-3 me-2" type="checkbox" role="switch" id="theme-toggle">
        <label class="visually-hidden" for="theme-toggle">Toggle between light and dark theme</label>
        <div class="d-flex align-items-center">
          <i class="wi wi-moon-alt-waning-crescent-2 wi-3x fs-3"></i>
          <i class="wi wi-day-sunny wi-3x fs-3"></i>
        </div>
      </div>
      <!-- Unit switch -->
      <div class="form-check form-switch d-flex align-items-center">
        <input class="form-check-input unitToggleBtn me-2 fs-3" type="checkbox" role="switch" id="unitToggleBtn">
        <label class="visually-hidden" for="unitToggleBtn">Toggle between metric(Celsius) and imperial(Fahrenheit)
          units</label>
        <label class="form-check-label d-flex align-items-center" for="unitToggleBtn"><span
            class="menuItem">&deg;C/</span><span class="menuItem">&deg;F</span></label>
      </div>
      <!-- Language switch -->
      <div class="form-check form-switch d-flex align-items-center">
        <input class="form-check-input langToggleBtn fs-3 me-2" type="checkbox" role="switch" id="langToggleBtn">
        <label class="visually-hidden" for="langToggleBtn">Toggle between Swedish and English</label>
        <label class="form-check-label d-flex align-items-center" for="langToggleBtn">
          <img src="https://flagcdn.com/w40/se.png" srcset="https://flagcdn.com/w40/se.png 2x" width="40" height="25"
            alt="Set Swedish as language" class="me-1">
          <img src="https://flagcdn.com/w40/gb.png" srcset="https://flagcdn.com/w40/gb.png 2x" width="40" height="25"
            alt="Set English as language">
        </label>
      </div>
    </div>
    <!-- Title and input -->
    <form class="change-location my-4 text-center text-muted w-100">
      <label for="city" class="visually-hidden">Search for a city</label>
      <input type="text" name="city" id="city" class=" form-control p-4 fs-4 inputField"
        placeholder="Sök efter en stad..." autofocus>
    </form>

    <div class="mainWeatherContainer bg-body rounded-3 d-none container">
      <section class="mainLeft text-center text-muted">
        <!-- Flag -->
        <!-- cityName -->
        <!-- Hour of day -->
        <!-- weatherIcon -->
        <!-- weatherStatusName -->
        <!-- Temperature -->
        <!-- windArrow -->
        <!-- Windspeed -->
        <!-- Rain -->
      </section>
      <section class="mainRight text-center mt-4 ">
        <table class="table text-center mainRightTable">
        </table>
      </section>
    </div>

    <!-- 5 day forecast table -->
    <div class="forecastTableContainer mt-4 bg-body rounded-3 overflow-hidden">
      <div class="container">
        <h2 class="text-body display-6 forecastTableTitle bg-body">5-dygnsprognos</h2>
      </div>
      <table class="forecastTable table text-center ">
        <thead>
          <tr>
            <th>
              <span class="dayHeading">Dygn</span>
            </th>
            <th><!-- Weather icon --></th>
            <th>
              <span class="tempHeading">L/H</span>
            </th>
            <th><span class="windHeading">Vind</span><span class="windUnit text-secondary ">m/s</span></th>
            <th><span class="precHeading">Nederbörd</span><span class="precUnit text-secondary ">mm</span></th>
          </tr>
        </thead>
        <tbody class="table-group-divider weatherTable">
        </tbody>
      </table>
    </div>
  </main>

  <script src="scripts/app.js" type="module"></script>
</body>

</html>
