<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <!-- Favicon -->
  <link rel="icon" href="https://fav.farm/%F0%9F%8C%84">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Sitewide custom CSS -->
  <!-- Weather icons -->
  <link rel="stylesheet" href="css/weather-icons-wind.css">
  <link rel="stylesheet" href="css/weather-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/mediaQueries.css">

  <title>JMHI Weather</title>
</head>

<body>

  <!-- Site container -->
  <main class="site-container container mb-5">
    <h1 class=" text-muted text-center my-4">JMHI Väder</h1>
    <p class="text-center">Den Fenomenala Väderstationen i Etern</p>
    <!-- Settings container -->
    <div class="settingsContainer d-flex justify-content-center align-items-center gap-5 flex-nowrap">
      <!-- Theme switch -->
      <div class="form-check form-switch d-flex align-items-center">
        <input class="form-check-input themeToggle fs-2 me-3" type="checkbox" role="switch" id="theme-toggle" switch>
        <label class="form-check-label fs-3" for="themeToggle"></label>
        <i class="wi wi-moon-alt-waning-crescent-2 wi-3x fs-3"></i>
        <i class="wi wi-day-sunny wi-3x fs-3"></i>
      </div>
      <!-- Unit switch -->
      <div class="form-check form-switch d-flex align-items-center">
        <input class="form-check-input unitToggleBtn fs-2 me-3" type="checkbox" role="switch" id="unitToggleBtn" switch>
        <label class="form-check-label fs-5" for="unitToggleBtn"><span class="menuItem">Metric/</span><span
            class="menuItem">Imperial</span></label>
      </div>
      <!-- Language switch -->
      <div class="form-check form-switch d-flex align-items-center">
        <input class="form-check-input langToggleBtn fs-2 me-3" type="checkbox" role="switch" id="langToggleBtn" switch>
        <label class="form-check-label fs-3" for="langToggleBtn"><img src="https://flagcdn.com/w40/se.png"
            srcset="https://flagcdn.com/w40/se.png 2x" width="40" alt="Set swedish as language"> <img
            src="https://flagcdn.com/w40/gb.png" srcset="https://flagcdn.com/w40/gb.png 2x" width="40"
            alt="Set english as language"></label>
      </div>
    </div>
    </>
    <!-- Title and input -->
    <form class="change-location my-4 text-center text-muted w-100">
      <label for="city" class="visually-hidden">Search for a city</label>
      <input type="text" name="city" id="city" class=" form-control p-4 fs-4" placeholder="Sök efter en stad..."
        autofocus>
    </form>

    <div class="mainWeatherContainer mt-2 bg-body rounded-3 d-none py-4">
      <section class="mainLeft text-center text-muted ">
        <!-- Flag -->
        <!-- cityName -->
        <!-- Hour of day -->
        <!-- weatherIcon -->
        <!-- weatherStatusName -->
        <!-- Temperature -->
        <!-- windArrow -->
        <!-- Windspeed -->
        <!-- Rain -->
      </section>
      <section class="mainRight text-center mt-4 ">
        <table class="table text-center mainRightTable">
        </table>
      </section>
    </div>

    <!-- 5 day forecast table -->
    <div class="forecastTableContainer mt-4 bg-body rounded-3 overflow-hidden d-none">
      <div class="text-body display-6 p-3 forecastTableTitle bg-body">5-dygnsprognos</div>
      <table class="forecastTable table text-center fs-4 align-middle">
        <thead>
          <tr>
            <th class="dayHeading">
              Dygn
            </th>
            <th><!-- Weather icon --></th>
            <th>
              L/H
            </th>
            <th><span class="windHeading">Vind(byvind)</span><span class="windUnit text-secondary fs-5">m/s</span></th>
            <th><span class="precHeading">Nederbörd</span><span class="text-secondary fs-5">mm</span></th>
          </tr>
        </thead>
        <tbody class="table-group-divider weatherTable">
        </tbody>
      </table>
    </div>
  </main>

  <script src="scripts/app.js" type="module"></script>
</body>

</html>
